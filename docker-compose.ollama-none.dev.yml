services:
  db:
    image: postgres:16.2-bullseye
    container_name: db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./db/scripts:/scripts
      - ./db/snapshot:/docker-entrypoint-initdb.d
      - db-data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"

  db-dashboard:
    image: dpage/pgadmin4:8.13
    container_name: db-dashboard
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "${DB_DASHBOARD_PORT}:80"
    volumes:
      - db-dashboard-data:/var/lib/pgadmin

  backend:
    build: ./backend
    container_name: backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT}:8000"
    volumes:
      - ./backend:/app
      - ./logs/backend:/app/logs
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - APP_CONTEXT=backend

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:8080"
    volumes:
      - ./frontend:/app/frontend
      - ./logs/frontend:/app/logs
    depends_on:
      - backend
      - db-dashboard
    env_file:
      - .env
    environment:
      - APP_CONTEXT=frontend
      - BACKEND_ENDPOINT=http://backend:8000
      # In-container listener must be 8080 — see docker-compose.yml for context.
      - FRONTEND_PORT=8080

volumes:
  db-data:
  db-dashboard-data:
