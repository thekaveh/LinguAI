services:
  db:
    image: postgres:16.2-bullseye
    container_name: db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./db/scripts:/scripts
      - ./db/snapshot:/docker-entrypoint-initdb.d
      - db-data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"

  db-dashboard:
    image: dpage/pgadmin4:8.13
    container_name: db-dashboard
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "${DB_DASHBOARD_PORT}:80"
    volumes:
      - db-dashboard-data:/var/lib/pgadmin

  ollama:
    build: ./ollama
    container_name: ollama
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "${OLLAMA_PORT}:11434"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_APP_USER}:${POSTGRES_APP_PASSWORD}@${POSTGRES_DB_HOST}:5432/${POSTGRES_DB}

  backend:
    build: ./backend
    container_name: backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT}:8000"
    volumes:
      - ./backend:/app
      - ./logs/backend:/app/logs
    depends_on:
      - db
      - ollama
    env_file:
      - .env
    environment:
      - APP_CONTEXT=backend
      - OLLAMA_API_ENDPOINT=http://ollama:11434

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:8080"
    volumes:
      - ./frontend:/app/frontend
      - ./logs/frontend:/app/logs
    depends_on:
      - backend
      - db-dashboard
    env_file:
      - .env
    environment:
      - APP_CONTEXT=frontend
      - BACKEND_ENDPOINT=http://backend:8000
      # In-container listener must always be 8080 (the right-side of the port
      # mapping above). Without this override, AppConfig would read the host's
      # FRONTEND_PORT from .env and bind NiceGUI to the host port internally,
      # causing the mapping to forward to a closed port.
      - FRONTEND_PORT=8080

volumes:
  db-data:
  db-dashboard-data:
